name: GitHub Actions
on:
  push:
    branches:
      - master
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    container:
      image: webdeveloppro/tabs-yarn:latest   # or ghcr.io/my-org/my-app:1.2.3
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      # Why do we need it?
      # - name: Build and push
      #   uses: docker/build-push-action@v4
      #   with:
      #     push: true
      #     context: .
      #     tags: |
      #       cr.webdevelop.pro/webdevelop-pro/invest.webdevelop.pro:latest
     
      - name: Find required build
        run: |
          set -a
          source /app/.master.env
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          ## fix russian letters
          export LANG=en_US.UTF-8
          export LC_ALL=en_US.UTF-8
          git config --global core.quotepath false
          
          git diff-tree --no-commit-id --name-status -r HEAD > /app/git_diff.txt
          cat /app/git_diff.txt
          cp -rf $GITHUB_WORKSPACE /app/docs
          cd /app
          chmod +x ./make.sh
          export VITE_SRC_DIR=$GITHUB_WORKSPACE
          

          ## run build to identify last changes
          node etc/trigger_builds.cjs
          echo "home" >> updated_stages.txt
          cat updated_stages.txt

      - name: Deploy
        run: |
          cd /app
          set -a
          source .master.env
          ./make.sh deploy-needed
          echo "done"

      - name: Update algolia search
        run: |
          cd /app
          set -a
          source .master.env
          ls /app/docs
          # Helper: returns 0 if the path should be excluded (.github / .obsidian / non-md).
          should_skip() {
            local p="$1"
            if [[ -z "$p" ]]; then return 0; fi
            if [[ "$p" == *".github"* || "$p" == *".obsidian"* ]]; then return 0; fi
            if [[ "$p" != *.md ]]; then return 0; fi
            return 1
          }

          if [ -s /app/git_diff.txt ]; then
              # git diff-tree --name-status output: "<STATUS>\t<path>" or "R100\t<old>\t<new>"
              while IFS= read -r line || [[ -n "$line" ]]; do
                if [[ -z "$line" ]]; then continue; fi

                status=$(printf '%s' "$line" | cut -f1)
                case "$status" in
                  A|M|T)
                    file=$(printf '%s' "$line" | cut -f2)
                    if should_skip "$file"; then
                      echo "Skipping: $file"
                      continue
                    fi
                    echo "Updating: docs/$file"
                    node search/index.mjs --update "$file" || echo "Update failed (continuing): $file"
                    ;;
                  D)
                    file=$(printf '%s' "$line" | cut -f2)
                    if should_skip "$file"; then
                      echo "Skipping deleted: $file"
                      continue
                    fi
                    echo "Deleting from algolia: $file"
                    node search/index.mjs --delete "$file" || echo "Delete failed (continuing): $file"
                    ;;
                  R*|C*)
                    old=$(printf '%s' "$line" | cut -f2)
                    new=$(printf '%s' "$line" | cut -f3)
                    if should_skip "$old"; then
                      echo "Skipping renamed-from: $old"
                    else
                      echo "Deleting renamed-from: $old"
                      node search/index.mjs --delete "$old" || echo "Delete failed (continuing): $old"
                    fi
                    if should_skip "$new"; then
                      echo "Skipping renamed-to: $new"
                    else
                      echo "Updating renamed-to: docs/$new"
                      node search/index.mjs --update "$new" || echo "Update failed (continuing): $new"
                    fi
                    ;;
                  *)
                    echo "Skipping unknown status '$status': $line"
                    ;;
                esac
              done < "/app/git_diff.txt"
          else
              echo "File is empty, skipping..."
          fi
          
          echo "done"

